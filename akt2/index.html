<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro-IoT Dashboard | Yasmin Amreiza</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<style>
:root {
  --primary: #10b981; /* Hijau zamrud */
  --accent: #ef4444;  /* Merah terang */
  --success: #059669; /* Hijau gelap untuk sukses */
  --danger: #dc2626;  /* Merah gelap untuk error */
  --bg-dark: #0f172a;
  --card-bg: #1e293b;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-dark);
  /* Latar belakang dengan cahaya hijau di kanan atas dan merah di kiri bawah */
  background-image: radial-gradient(circle at top right, #14532d, transparent), 
                    radial-gradient(circle at bottom left, #7f1d1d, transparent);
  color: var(--text-main);
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 900px;
}

/* Header Section */
header {
  text-align: center;
  margin-bottom: 30px;
}

h2 {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 10px;
  /* Gradasi judul dari hijau ke merah muda */
  background: linear-gradient(to right, #4ade80, #f87171);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.user-badge {
  display: inline-block;
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid rgba(16, 185, 129, 0.3);
  padding: 5px 15px;
  border-radius: 20px;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  font-size: 0.8rem;
  letter-spacing: 1px;
}

/* Status Banner */
#status {
  padding: 15px;
  border-radius: 12px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 25px;
  background: var(--danger);
  box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
  transition: all 0.3s ease;
}

/* Card Style */
.card {
  background: var(--card-bg);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 16px;
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
}

.card-header {
  background: rgba(255, 255, 255, 0.03);
  padding: 15px 20px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.card-header:hover {
  background: rgba(255, 255, 255, 0.07);
}

.card-content {
  padding: 20px;
  display: none;
}

.card-content.active {
  display: block;
}

/* Form Elements */
label {
  display: block;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  background: #0f172a;
  border: 1px solid #334155;
  color: white;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  box-sizing: border-box;
  font-size: 1rem;
}

input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
}

button {
  width: 100%;
  background: var(--primary);
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

button:hover {
  background: #059669;
  transform: translateY(-1px);
}

button:active {
  transform: translateY(1px);
}

/* Terminal / Messages */
#messages {
  background: #000;
  color: #4ade80;
  padding: 15px;
  height: 250px;
  overflow-y: auto;
  font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 0.85rem;
  border-radius: 8px;
  border: 1px solid #1e293b;
  line-height: 1.5;
}

#messages::-webkit-scrollbar {
  width: 6px;
}
#messages::-webkit-scrollbar-thumb {
  background: #334155;
  border-radius: 3px;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h2>IoT Dashboard Control</h2>
    <div class="user-badge">Developed by Yasmin Amreiza</div>
  </header>

  <div id="status">STATUS: DISCONNECTED</div>

  <div class="card">
    <div class="card-header">
      <span>1. MQTT CONFIGURATION</span>
      <span>⚙️</span>
    </div>
    <div class="card-content active">
      <label>Connection Protocol</label>
      <select id="protocol">
        <option value="wss">Secure WebSocket (WSS)</option>
        <option value="ws">Standard WebSocket (WS)</option>
      </select>
      <label>Broker URL</label>
      <input id="broker" value="broker.emqx.io">
      <label>Port</label>
      <input id="port" value="8084">
      <button id="connectBtn">Establish Connection</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>2. TOPIC MONITORING (SUBSCRIBE)</span>
      
    </div>
    <div class="card-content">
      <label>Incoming Topic Path</label>
      <input id="subtopic" placeholder="e.g. yasmin/sensor/data">
      <button id="subscribeBtn" style="background: var(--accent);">Monitor Topic</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>3. REMOTE CONTROL (PUBLISH)</span>
    </div>
    <div class="card-content">
      <label>Destination Topic</label>
      <input id="pubtopic" placeholder="e.g. yasmin/actuator/led">
      <label>Command / Message</label>
      <input id="message" placeholder="Type your command here...">
      <button id="publishBtn">Transmit Data</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>SYSTEM LOG & TELEMETRY</span>
      
    </div>
    <div class="card-content active">
      <div id="messages">System initialized. Awaiting user action...</div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let client = null;
let connected = false;

document.querySelectorAll(".card-header").forEach(header => {
  header.addEventListener("click", () => {
    header.nextElementSibling.classList.toggle("active");
  });
});

const log = text => {
  const msgBox = $("messages");
  const time = new Date().toLocaleTimeString();
  msgBox.innerHTML += `<div><span style="color: #64748b">[${time}]</span> ${text}</div>`;
  msgBox.scrollTop = msgBox.scrollHeight;
};

const setStatus = (text, type) => {
  const status = $("status");
  status.textContent = `STATUS: ${text.toUpperCase()}`;
  if(type === "success") {
    status.style.background = "var(--success)";
    status.style.boxShadow = "0 4px 20px rgba(5, 150, 105, 0.4)";
  } else if(type === "danger") {
    status.style.background = "var(--danger)";
    status.style.boxShadow = "0 4px 20px rgba(220, 38, 38, 0.4)";
  } else {
    status.style.background = "var(--primary)";
    status.style.boxShadow = "0 4px 20px rgba(16, 185, 129, 0.4)";
  }
};

$("connectBtn").addEventListener("click", () => {
  const protocol = $("protocol").value;
  const broker = $("broker").value;
  const port = parseInt($("port").value);
  const clientID = "web_pro_" + Math.random().toString(16).substr(2,8);
  
  client = new Paho.MQTT.Client(broker, port, "/mqtt", clientID);
  
  client.onConnectionLost = (resp) => {
    connected = false;
    setStatus("Connection Lost", "danger");
    log(`<span style="color: var(--danger)">Connection lost: ${resp.errorMessage}</span>`);
  };

  client.onMessageArrived = (msg) => {
    log(`<span style="color: var(--accent)">[RECV]</span> Topik: <b>${msg.destinationName}</b> | Data: <b>${msg.payloadString}</b>`);
  };

  log(`Attempting to connect to ${broker}...`);
  client.connect({
    useSSL: protocol === "wss",
    timeout: 5,
    onSuccess: () => {
      connected = true;
      setStatus(`Connected to ${broker}`, "success");
      log(`<span style="color: var(--primary)">Successfully connected to global broker.</span>`);
    },
    onFailure: (err) => {
      setStatus("Connection Failed", "danger");
      log(`<span style="color: var(--danger)">Failure: ${err.errorMessage}</span>`);
    }
  });
});

$("subscribeBtn").addEventListener("click", () => {
  if(!connected) return alert("Please establish connection first!");
  const topic = $("subtopic").value;
  if(!topic) return alert("Topic path cannot be empty!");
  client.subscribe(topic);
  log(`Listening on topic: <span style="color: var(--accent)">${topic}</span>`);
});

$("publishBtn").addEventListener("click", () => {
  if(!connected) return alert("Please establish connection first!");
  const topic = $("pubtopic").value;
  const msg = $("message").value;
  if(!topic || !msg) return alert("Fill both topic and message!");
  
  const message = new Paho.MQTT.Message(msg);
  message.destinationName = topic;
  client.send(message);
  log(`<span style="color: #cbd5e1">[SENT]</span> To: ${topic} | Msg: ${msg}`);
});
</script>

</body>
</html>
