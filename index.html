<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website YASMIN AMREIZA</title>
  <style>
    /* Mengatur tampilan seluruh halaman */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #b30000 0%, #008000 100%); /* Merah ke Hijau */
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    /* Membuat kotak konten bergaya modern (Glassmorphism) */
    .container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 5px;
      color: #00ff66; /* Hijau terang */
    }

    h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      font-weight: 400;
    }

    p {
      font-size: 1.2em;
      line-height: 1.6;
    }

    /* Efek badge untuk nama */
    .highlight {
      background-color: #ff1a1a; /* Merah terang */
      color: white;
      padding: 5px 15px;
      border-radius: 8px;
      font-weight: bold;
      display: inline-block;
      margin-top: 10px;
      border: 2px solid #00ff66; /* Border hijau */
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello GitHub Pages! 🚀</h1>
    <h2>Selamat datang di website pertama buatan</h2>
    <div class="highlight">ROBI-1973</div>
    <p>Belajar GitHub Pages itu ternyata seru dan gampang! 🎉</p>
  </div>
</body>
</html>
