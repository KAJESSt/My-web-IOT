<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Yasmin Amreiza</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* Gradasi background dari merah gelap ke hijau gelap */
      background: linear-gradient(135deg, #7f1d1d 0%, #14532d 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    /* Warna teks h1 menjadi hijau terang */
    h1 { font-size: 2.5em; margin-bottom: 5px; color: #4ade80; }
    h2 { font-size: 1.5em; margin-bottom: 20px; font-weight: 400; }
    p { font-size: 1.2em; line-height: 1.6; }
    /* Warna kotak highlight menjadi merah menyala */
    .highlight {
      background-color: #ef4444; color: white; padding: 5px 15px;
      border-radius: 8px; font-weight: bold; display: inline-block;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello GitHub Pages! 🚀</h1>
    <h2>Selamat datang di website pertama buatan</h2>
    <div class="highlight">Yasmin Amreiza</div>
    <p>Belajar GitHub Pages itu ternyata seru dan gampang! 🎉</p>
  </div>
</body>
</html>
